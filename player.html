<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academic Video Player</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/player.css">
</head>
<body>

    <div class="menu-backdrop" id="menuBackdrop"></div>

    <aside class="side-menu" id="sideMenu">
        <div class="menu-header">
            <button class="menu-close-btn" id="menuCloseBtn">&times;</button>
        </div>
        <nav class="menu-links">
            <a href="index.html" class="active"><i class="fa-solid fa-house"></i> Home</a>
            <a href="admin.html"><i class="fa-solid fa-store"></i> Admin Workspace</a>
            <a href="#"><i class="fa-solid fa-tags"></i> Offers</a>
            <a href="profile.html"><i class="fa-solid fa-user"></i> Profile</a>
            <a href="#"><i class="fa-solid fa-envelope"></i> Contact Us</a>
        </nav>
    </aside>

    <nav class="navbar">
        <div class="nav-actions">
            <button class="menu-btn" id="menuOpenBtn">
                <span></span>
                <span></span>
                <span></span>
            </button>

            <div class="login-cart-btn" style="margin-left:auto; display: flex;">
                <a href="login.html" id="cart-nav-btn"
                    style="border-radius: 0px; padding: 8px 20px; background-color: #007bff; margin-right: 0px; font-size: 16px; color: #ffffff; text-decoration: none; display: flex; align-items: center;">
                    <i class="fa-solid fa-cart-shopping"></i>
                </a>
                <a href="login.html" id="login-btn">Log In</a>
            </div>
        </div>
    </nav>
    
    <div class="player-container">
        <div class="video-wrapper">
            <div id="videoOverlay"></div>
            
            <iframe id="youtubePlayer" src="" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share; fullscreen" allowfullscreen></iframe>
            
            <video id="directPlayer" style="display: none; background: #000;"></video>
        </div>

        <div class="customControls" id="customControls">
            <button id="fullscreenBtn">
                <i class="fa-solid fa-expand"></i> Fullscreen
            </button>
        </div>

        <div class="video-info">
            <h3 id="videoTitle">Loading Lecture Title...</h3>
        </div>
    </div>

    <script type="module" src="js/player.js"></script>
</body>
</html>
